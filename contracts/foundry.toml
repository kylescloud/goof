[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = true
evm_version = "cancun"
gas_reports = ["ArbitrageExecutor"]
ffi = false
ast = true
build_info = true
extra_output = ["abi", "evm.bytecode"]

[profile.default.fuzz]
runs = 256
max_test_rejects = 65536
seed = "0x1"

[profile.default.invariant]
runs = 64
depth = 32
fail_on_revert = false

[rpc_endpoints]
base_mainnet = "${RPC_URL_PRIMARY}"
base_sepolia = "https://sepolia.base.org"

[etherscan]
base_mainnet = { key = "${BASESCAN_API_KEY}", url = "https://api.basescan.org/api", chain = 8453 }

[fmt]
bracket_spacing = false
int_types = "long"
line_length = 120
multiline_func_header = "attributes_first"
number_underscore = "thousands"
quote_style = "double"
single_line_statement_blocks = "single"
tab_width = 4
wrap_comments = true